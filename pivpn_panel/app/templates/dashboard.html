{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Dashboard Principal</h2>
    <div>
        <a href="{{ url_for('clients.list_clients') }}" class="btn btn-primary btn-sm me-2">Gestionar Clientes</a>
        <a href="{{ url_for('auth.logout') }}" class="btn btn-danger btn-sm">Cerrar Sesión</a>
    </div>
</div>
<div class="card shadow-sm mb-4">
    <div class="card-body">
        <h5>Bienvenido, {{ user.username }}</h5>
        <p class="text-muted">La infraestructura base está lista. Aquí integraremos los módulos de PiVPN, OpenVPN, Cloudflare, Plex y OMV.</p>
    </div>
</div>
{% endblock %}
